<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Link</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <header>
        <span class="logo-small">Link</span>
        <nav>
            <input id="search-input" type="text" placeholder="Buscar usuários" />
            <button id="search-btn">Buscar</button>
            <button id="profile-btn">Perfil</button>
        </nav>
    </header>

    <main class="main-content">
        <section class="feed" id="feed-panel">
        <div class="compose">
            <textarea id="post-input" placeholder="Escreva aqui!"></textarea>
            <button id="post-btn">Publicar</button>
        </div>
        <div id="posts-container"></div>
        </section>

        <aside class="sidebar" id="suggestions-panel">
        <h3>Sugestões</h3>
        <ul id="suggestions-list"></ul>
        </aside>
    </main>

    <footer>
        <p>
        Feito por Murilo e Octávio exclusivamente para fins acadêmicos.
        </p>
    </footer>

    <div id="toast" class="toast hidden"></div>

    <script src="app.js"></script>
</body>
</html>

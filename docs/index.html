<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Link</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header>
        <a href="./">
            <img src="Jink.png" alt="Link - Perfil" class="logo-img" />
        </a>
        <nav aria-label="Navegação principal">
            <div class="search-group" role="search">
                <label for="search-input" class="sr-only">Buscar usuários</label>
                <input
                    id="search-input"
                    type="search"
                    placeholder="Buscar usuários…"
                    maxlength="32"
                    autocomplete="off"
                    aria-label="Buscar usuários"
                />
                <button id="search-btn" aria-label="Executar busca">Buscar</button>
            </div>
            <a id="profile-btn" href="login.html" aria-label="Log in">Login</a>
        	<button id="exit-btn" aria-label="Sair"><img src="log-out.svg" class="button-icon"></button>
		</nav>
    </header>

    <main class="main-content" id="main">
        <section class="feed" id="feed-panel" aria-label="Feed de publicações">

            <div class="compose" role="region" aria-label="Nova publicação">
                <div class="compose-author" id="compose-author" aria-live="polite">Parece que você não logou ainda...</div>
                <label for="post-input" class="sr-only">Conteúdo da publicação</label>
                <textarea
                    id="post-input"
                    placeholder="O que você está pensando?"
                    maxlength="256"
                    aria-describedby="compose-count compose-hint"
                ></textarea>
                <div class="compose-footer">
                    <span id="compose-count" aria-live="polite" aria-atomic="true">0/256</span>
                    <span id="compose-hint" class="sr-only">Máximo de 256 caracteres</span>
                    <button id="post-btn">Publicar</button>
                </div>
            </div>

            <div
                id="posts-container"
                aria-label="Publicações"
                aria-live="polite"
            ></div>

        </section>

        <aside class="sidebar" id="suggestions-panel" aria-label="Sugestões de usuários">
            <h2 class="sidebar-heading">Sugestões</h2>
            <ul id="suggestions-list" aria-label="Lista de sugestões"></ul>
        </aside>
    </main>

    <footer>
        <p class="footnote">
            Feito por Murilo e Octávio exclusivamente para fins acadêmicos.
        </p>
    </footer>

    <div
        id="toast"
        class="toast hidden"
        role="status"
        aria-live="polite"
        aria-atomic="true"
    ></div>

    <script src="utils.js"></script>
    <script src="main.js"></script>
</body>
</html>

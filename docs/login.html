<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Link - Entrar</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles/style.css" />
</head>

<body>
    <main class="login-content">
        <a href="./">
            <img src="images/Jink.png" alt="Logo principal" class="logo-img-large" />
        </a>

        <form class="login-form">
            <div class="field-group">
                <label for="username-input">Usuário</label>
                <input id="username-input" type="text" maxlength="16" required />
            </div>

            <div class="field-group">
                <label for="password-input">Senha</label>
                <input id="password-input" type="password" required/>
            </div>

            <button type="submit" class="login-btn" id="signin-btn">Entrar</button>
            <button type="submit" class="login-btn" id="signup-btn">Cadastrar</button>

            <p class="footnote">
                * Nunca utilize a mesma senha de outros sites.
            </p>
        </form>
    </main>

    <div id="toast" class="toast hidden"></div>

    <footer>
        <p class="footnote">
            Feito por Murilo e Octávio exclusivamente para fins acadêmicos.
        </p>
    </footer>

    <script src="scripts/utils.js"></script>
    <script src="scripts/login.js"></script>
</body>
</html>

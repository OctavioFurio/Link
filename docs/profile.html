<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Link</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles/style.css" />
</head>
<body>
    <header>
        <a href="./">
            <img src="images/Jink.png" alt="Link - Perfil" class="logo-img" />
        </a>
        <nav aria-label="Navegação principal"></nav>
        	<button id="exit-btn" class="btn-icon" aria-label="Sair">
                <svg 
                    xmlns="http://www.w3.org/2000/svg" width="32" height="32" 
                    viewBox="0 0 24 24" fill="none" stroke="#ffffff" 
                    stroke-width="3" stroke-linecap="round" stroke-linejoin="round" 
                    class="svg-icon"
                >
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
            </button>
        </nav>
    </header>
    <main class="main-content profile-page" id="main">
        <section class="feed" aria-label="Aba de perfil">
            <div class="profile-card">
                <div class="profile-top">
                    <div class="profile-left">
                        <div class="mink-popup-wrapper">
                            <canvas id="pfp-canvas" width="140" height="140"></canvas>
                        </div>

                        <div class="profile-info">
                            <h2 id="profile-name"></h2>

                            <div class="profile-stats">
                                <div>
                                    <strong id="followers-count">0</strong>
                                    <span>Seguidores</span>
                                </div>

                                <div>
                                    <strong id="following-count">0</strong>
                                    <span>Seguindo</span>
                                </div>

                                <div>
                                    <strong id="likes-count">0</strong>
                                    <span>Curtidas</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <button id="profile-btn">
                        Customizar Mink
                    </button>

                </div>

                <div class="bio-view">
                    <p id="bio-text" class="profile-bio"></p>
                    <button id="edit-bio-btn">
                        Editar bio
                    </button>
                </div>

                <div class="bio-section is-hidden">
                    <label for="bio-input" class="sr-only">Bio</label>

                    <textarea
                        id="bio-input"
                        maxlength="256"
                        placeholder="Conte um pouco sobre você..."
                    ></textarea>

                    <div class="bio-footer">
                        <span id="bio-count">0/256</span>
                        <button id="save-bio">Salvar bio</button>
                    </div>
                </div>

                <h3 class="section-title">Posts</h3>
            </div>
        </section>

        <section id="user-posts"></section>

        <div id="chat-widget" style="display:none">
            <div id="chat-box" class="hidden">
                <div id="chat-sidebar">
                    <div id="chat-sidebar-heading">
                        Conversas
                        <button id="chat-refresh-btn" class="btn-icon">
                            <svg 
                                xmlns="http://www.w3.org/2000/svg" width="32" height="32" 
                                viewBox="0 0 24 24" fill="none" stroke="#ffffff" 
                                stroke-width="3" stroke-linecap="round" stroke-linejoin="round" 
                                class="svg-icon">
                                <polyline points="1 4 1 10 7 10"></polyline>
                                <polyline points="23 20 23 14 17 14"></polyline>
                                <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path>
                            </svg>
                        </button>
                    </div>
                    <ul id="chat-user-list"></ul>
                </div>
                <div id="chat-main">
                    <div id="chat-header">
                        <span id="chat-receiver-name">Selecione alguém</span>
                    </div>
                    <div id="chat-messages"></div>
                    <div id="chat-input-row">
                        <input id="chat-input" type="text" placeholder="Mensagem…" maxlength="512" />
                        <button id="chat-send-btn">Enviar</button>
                    </div>
                </div>
            </div>
            <button id="chat-toggle-btn" class="btn-icon" title="Chat">
                <svg 
                    xmlns="http://www.w3.org/2000/svg" width="32" height="32" 
                    viewBox="0 0 24 24" fill="none" stroke="#ffffff" 
                    stroke-width="3" stroke-linecap="round" stroke-linejoin="round" 
                    class="svg-icon">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
                <span id="chat-notif-badge" style="display:none"></span>
            </button>
        </div>
    </main>

    <div id="toast" class="toast hidden"></div>

    <footer>
        <p class="footnote">
            Feito por Murilo e Octávio exclusivamente para fins acadêmicos.
        </p>
    </footer>

    <div id="inspector-backdrop" class="is-hidden" aria-hidden="true"></div>
    <div id="inspector-modal" class="is-hidden" role="dialog" aria-modal="true" aria-label="Customizar Mink">
        <button id="inspector-close" aria-label="Fechar">✕</button>
        <canvas id="pfp-preview" width="200" height="200" aria-hidden="true"></canvas>
        <div class="inspector-controls">
            <div class="color-row">
                <label for="color0">Pelo - Principal</label>
                <input type="color" id="color0" value="#f2ec98">
            </div>
            <div class="color-row">
                <label for="color1">Pelo - Secundário</label>
                <input type="color" id="color1" value="#f2c29a">
            </div>
            <div class="color-row">
                <label for="color2">Olhos e plano de fundo</label>
                <input type="color" id="color2" value="#579af1">
            </div>
        </div>
        <div class="action-bar">
            <button id="save-file">Salvar como arquivo</button>
            <button id="save-colors">Salvar Mink</button>
        </div>
    </div>

    <script src="scripts/utils.js"></script>
    <script src="scripts/mink.js"></script>
    <script src="scripts/chat.js"></script>
    <script src="scripts/profile.js"></script>
</body>
</html>

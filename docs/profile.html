<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Link</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header>
        <a href="./">
            <img src="Jink.png" alt="Link - Perfil" class="logo-img" />
        </a>
    </header>
    <main class="main-content profile-page" id="main">
        <section class="feed" aria-label="Aba de perfil">
            <div class="profile-card">
                <div class="profile-top">
                    <div class="profile-left">
                        <div class="mink-popup-wrapper">
                            <canvas id="pfp-canvas" width="140" height="140"></canvas>
                        </div>

                        <div class="profile-info">
                            <h2 id="profile-name"></h2>

                            <div class="profile-stats">
                                <div>
                                    <strong id="followers-count">0</strong>
                                    <span>Seguidores</span>
                                </div>

                                <div>
                                    <strong id="following-count">0</strong>
                                    <span>Seguindo</span>
                                </div>

                                <div>
                                    <strong id="likes-count">0</strong>
                                    <span>Curtidas</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <button id="profile-btn" class="btn-ghost">
                        Customizar Mink
                    </button>

                </div>

                <div class="bio-view">
                    <p id="bio-text" class="profile-bio"></p>
                    <button id="edit-bio-btn" class="btn-ghost">
                        Editar bio
                    </button>
                </div>

                <div class="bio-section is-hidden">
                    <label for="bio-input" class="sr-only">Bio</label>

                    <textarea
                        id="bio-input"
                        maxlength="256"
                        placeholder="Conte um pouco sobre você..."
                    ></textarea>

                    <div class="bio-footer">
                        <span id="bio-count">0/256</span>
                        <button id="save-bio">Salvar bio</button>
                    </div>
                </div>

                <h3 class="section-title">Posts</h3>
            </div>
        </section>

        <section id="user-posts"></section>
    </main>
    <footer>
        <p class="footnote">
            Feito por Murilo e Octávio exclusivamente para fins acadêmicos.
        </p>
    </footer>

    <div id="toast" class="toast hidden" role="status" aria-live="polite" aria-atomic="true"></div>

    <div id="inspector-backdrop" class="is-hidden" aria-hidden="true"></div>
    <div id="inspector-modal" class="is-hidden" role="dialog" aria-modal="true" aria-label="Customizar Mink">
        <button id="inspector-close" aria-label="Fechar">✕</button>
        <canvas id="pfp-preview" width="200" height="200" aria-hidden="true"></canvas>
        <div class="inspector-controls">
            <div class="color-row">
                <label for="color0">Pelo - Principal</label>
                <input type="color" id="color0" value="#f2ec98">
            </div>
            <div class="color-row">
                <label for="color1">Pelo - Secundário</label>
                <input type="color" id="color1" value="#f2c29a">
            </div>
            <div class="color-row">
                <label for="color2">Olhos e plano de fundo</label>
                <input type="color" id="color2" value="#579af1">
            </div>
        </div>
        <div class="action-bar">
            <button id="save-file">Salvar como arquivo</button>
            <button id="save-colors">Salvar Mink</button>
        </div>
    </div>

    <script src="scripts/utils.js"></script>
    <script src="scripts/mink.js"></script>
    <script src="scripts/chat.js"></script>
    <script src="scripts/profile.js"></script>
</body>
</html>
